<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NelsonAI</title>

<!-- MARKED.JS -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
:root {
    --primary: #0a2540;
    --secondary: #123a63;
    --accent: #1d4ed8;
    --bg: #020617;
    --text: #e2e8f0;
    --muted: #94a3b8;
}

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: system-ui, sans-serif;
}

body {
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
}

/* APP */
.app {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
}

/* HEADER */
.header {
    background: var(--primary);
    padding: 14px;
    text-align: center;
    font-weight: 600;
    border-bottom: 1px solid #0f172a;
}

/* CHAT */
.chat {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* MESSAGE */
.msg {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 0.95rem;
    line-height: 1.4;
    animation: fadeIn 0.2s ease;
}

.user {
    align-self: flex-end;
    background: var(--accent);
    color: white;
}

.ai {
    align-self: flex-start;
    background: var(--primary);
    border: 1px solid #1e293b;
}

/* MARKDOWN CONTENT */
.msg pre {
    background: #020617;
    padding: 10px;
    border-radius: 8px;
    overflow-x: auto;
    margin-top: 8px;
}

.msg code {
    background: #020617;
    padding: 2px 6px;
    border-radius: 6px;
    font-size: 0.85rem;
}

/* INPUT */
.input-area {
    padding: 10px;
    background: var(--primary);
}

.row {
    display: flex;
    gap: 8px;
}

input[type="text"] {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #020617;
    color: white;
}

button {
    background: var(--accent);
    border: none;
    padding: 10px 14px;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

/* FILE */
.file-input {
    font-size: 0.75rem;
    margin-bottom: 6px;
}

/* TYPING */
.typing {
    font-size: 0.8rem;
    color: var(--muted);
}

/* ANIM */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(4px);}
    to {opacity: 1; transform: translateY(0);}
}

/* DESKTOP */
@media (min-width: 768px) {
    .app {
        max-width: 700px;
        margin: auto;
        border-radius: 12px;
        overflow: hidden;
    }
}
</style>
</head>

<body>

<div class="app">
    <div class="header">🤖 NelsonAI</div>

    <div id="chat" class="chat"></div>

    <div class="input-area">
        <input type="file" id="file" class="file-input" accept=".txt,.md">

        <div class="row">
            <input id="input" type="text" placeholder="Ask NelsonAI anything...">
            <button onclick="send()">Send</button>
        </div>
    </div>
</div>

<script>
const BACKEND_URL = "https://agent-backend-1-bys8.onrender.com";
let fileData = "";

const chat = document.getElementById("chat");
const input = document.getElementById("input");

/* FILE */
document.getElementById("file").addEventListener("change", (e) => {
    const reader = new FileReader();
    reader.onload = (event) => fileData = event.target.result;
    reader.readAsText(e.target.files[0]);
});

/* BASIC SANITIZATION */
function escapeHTML(str) {
    return str.replace(/[&<>"']/g, function(m) {
        return ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        })[m];
    });
}

/* ADD MESSAGE */
function addMessage(content, type, isMarkdown=false) {
    const div = document.createElement("div");
    div.className = "msg " + type;

    if (isMarkdown) {
        div.innerHTML = marked.parse(content);
    } else {
        div.textContent = content;
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

/* TYPING */
function showTyping() {
    const div = document.createElement("div");
    div.className = "typing";
    div.id = "typing";
    div.textContent = "NelsonAI is thinking...";
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
    const el = document.getElementById("typing");
    if (el) el.remove();
}

/* SEND */
async function send() {
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    showTyping();

    try {
        const res = await fetch(`${BACKEND_URL}/chat`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                message: message,
                fileContent: fileData
            })
        });

        const data = await res.json();

        removeTyping();

        const aiText = data.response[0].text;

        // Render markdown
        addMessage(aiText, "ai", true);

    } catch (err) {
        removeTyping();
        addMessage("Error: Could not reach NelsonAI", "ai");
    }
}

/* ENTER */
input.addEventListener("keypress", (e) => {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
